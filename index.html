<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الثقافة والذكاء المالي</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --correct: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .ad-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            line-height: 1.6;
            text-align: right;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            width: 100%;
            background-color: #273549;
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #334155;
            border-color: var(--accent);
        }

        .result-screen {
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 25px;
            color: var(--accent);
        }

        .restart-btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background-color: var(--accent-hover);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #334155;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- 1. مساحة الإعلانات العلوية الثابتة -->
    <div class="ad-container">
        <iframe data-aa="2448272" src="//acceptable.a-ads.com/2448272?size=Adaptive" style="border:0; padding:0; width:100%; height:auto; overflow:hidden; display:block; margin:auto;"></iframe>
    </div>

    <div class="container">
        <!-- شاشة الاختبار الرئيسي -->
        <div id="quiz-card" class="card">
            <h1>💡 اختبار الثقافة والذكاء المالي</h1>
            <p id="quiz-subtitle" class="subtitle">اكتشف كيف تتعامل مع المال في 5 أسئلة عشوائية سريعة</p>
            
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>

            <div id="question-box">
                <p id="question-text" class="question-text">جاري تحميل السؤال...</p>
                <div id="options-container" class="options-list">
                    <!-- الأزرار تظهر هنا برمجياً -->
                </div>
            </div>
        </div>

        <!-- شاشة النتيجة النهائية -->
        <div id="result-card" class="card result-screen">
            <h1>📊 نتيجتك النهائية</h1>
            <p class="subtitle">تم تحليل إجاباتك المالية بنجاح</p>
            <div id="score-display" class="score-circle">0/10</div>
            <p id="feedback-text" style="line-height: 1.6; margin-bottom: 20px;"></p>
            <button class="restart-btn" onclick="startQuiz()">إعادة الاختبار بأسئلة جديدة 🔄</button>
        </div>
    </div>

    <!-- ربط ملف الأسئلة الخارجي -->
    <script src="questions.js"></script>

    <script>
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let adOpened = false; // متغير للتأكد من فتح الإعلان لمرة واحدة فقط لمنع إزعاج الزائر

        function startQuiz() {
            currentQuestions = getRandomQuestions(5); 
            currentQuestionIndex = 0;
            score = 0;
            adOpened = false; // إعادة تهيئة الإعلان عند بدء اختبار جديد
            
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showResults();
                return;
            }

            const progressPercent = (currentQuestionIndex / currentQuestions.length) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;

            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.question}`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // تعديل ذكي ليمرر ترتيب الزر (0 أو 1 أو 2) لاحتساب النتيجة بدقة
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => handleAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex) {
            // 🚀 ميزة الإعلان الإجباري المنبثق:
            // يفتح الإعلان في صفحة منفصلة عند أول ضغطة يقوم بها الزائر لحفظ التفاعل
            if (!adOpened) {
                // ضع رابط صفحة إعلانك الجديد أو نفس الرابط المباشر هنا بدلاً من الرابط التجريبي أدناه
                window.open('https://acceptable.a-ads.com/2448272', '_blank');
                adOpened = true; 
            }

            // احتساب النقاط الحقيقية: الخيار الثالث = نقطتان، الثاني = نقطة واحدة، الأول = 0 نقاط
            score += selectedIndex;

            currentQuestionIndex++;
            setTimeout(showQuestion, 300);
        }

        function showResults() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('result-card').style.display = 'block';
            
            // أعلى نتيجة ممكنة هي 10 نقاط (5 أسئلة × نقطتين كحد أقصى)
            document.getElementById('score-display').innerText = `${score}/10`;
            
            let feedback = "";
            if (score >= 8) {
                feedback = "ممتاز! لديك عقلية استثمارية واعية وتعرف كيف تدير وتنمي أموالك بحكمة لتأمين مستقبلك المالي.";
            } else if (score >= 4) {
                feedback = "جيد ومتوازن! أنت تحاول الموازنة بين متعة الحاضر وأمان المستقبل، لكنك تحتاج لترتيب ميزانيتك بذكاء أكبر.";
            } else {
                feedback = "تحتاج إلى مراجعة! إنفاقك عاطفي ومندفع قليلاً، من الأفضل البدء بتعلم أسس الادخار وبناء صندوق طوارئ متين.";
            }
            document.getElementById('feedback-text').innerText = feedback;
        }

        window.onload = () => {
            if (typeof getRandomQuestions === 'function') {
                startQuiz();
            } else {
                document.getElementById('question-text').innerText = "خطأ: لم يتم العثور على ملف الأسئلة questions.js!";
            }
        };
    </script>
</body>
</html>
